<div
  class="min-h-screen bg-secondaryBg py-6 sm:py-10"
  style="
    background-image: url('https://cdnjs.cloudflare.com/ajax/libs/svg-backgrounds/1.0.0/sparkles.svg');
    background-size: 300px;
  "
>
  <div class="max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-8">
    <!-- Título -->
    <div class="text-center mb-6 sm:mb-12">
      <h1 class="text-2xl sm:text-3xl font-bold text-primaryText inline-block relative">
        <span class="hidden sm:inline absolute -left-8 top-1/2 transform -translate-y-1/2 text-2xl">✨</span>
        Nuestros Productos
        <span class="hidden sm:inline absolute -right-8 top-1/2 transform -translate-y-1/2 text-2xl">✨</span>
      </h1>

      <!-- Línea decorativa -->
      <div class="h-1 w-20 sm:w-24 bg-gradient-to-r from-primaryHover to-primaryText mx-auto mt-2 sm:mt-3 rounded-full"></div>

      <!-- Descripción -->
      <p class="secundaryText mt-2 sm:mt-4 text-sm sm:text-base max-w-lg mx-auto px-4">
        Descubre nuestras adorables figuras 3D hechas con amor para ti
      </p>
    </div>

    <!-- Grid de productos -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6 lg:gap-8 px-3 sm:px-0">
      <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
    </div>

    <!-- Paginación -->
    <div class="mt-8 sm:mt-12 flex justify-center">
      <div class="flex space-x-1 sm:space-x-2">
        <button
          class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full bg-primaryWithBg border-2 border-primaryHover text-primaryText hover:bg-primaryHover transition-colors duration-200"
        >
          ←
        </button>
        <button
          class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full bg-primaryText text-primaryWithBg shadow-md"
        >
          1
        </button>
        <button
          class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full bg-primaryWithBg border-2 border-primaryHover text-primaryText hover:bg-primaryHover transition-colors duration-200"
        >
          2
        </button>
        <button
          class="w-8 h-8 sm:w-10 sm:h-10 flex items-center justify-center rounded-full bg-primaryWithBg border-2 border-primaryHover text-primaryText hover:bg-primaryHover transition-colors duration-200"
        >
          →
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  @media (max-width: 640px) {
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  }
</style>
