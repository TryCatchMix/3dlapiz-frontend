<div class="min-h-screen flex items-center justify-center bg-pageBg relative overflow-hidden px-4 py-10">

  <!-- Patrón de puntos sutil -->
  <div class="absolute inset-0 opacity-30 pointer-events-none"
       style="background-image: radial-gradient(circle at 1px 1px, #cba57f33 1px, transparent 0);
              background-size: 32px 32px;"></div>

  <!-- Blob decorativo -->
  <div class="absolute top-1/4 -left-32 w-96 h-96 rounded-full bg-accentSoft/60 blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 -right-32 w-96 h-96 rounded-full bg-primaryBg/40 blur-3xl pointer-events-none"></div>

  <div class="relative w-full max-w-md">

    <!-- Eyebrow -->
    <div class="text-center mb-8">
      <div class="text-[10px] uppercase tracking-[0.3em] text-accentText mb-3">
        Atelier · Acceso
      </div>
      <h1 class="font-serif text-4xl sm:text-5xl font-medium leading-[1] -tracking-[0.025em] text-ink">
        Bienvenido de <span class="italic text-accentText">vuelta</span>
      </h1>
      <div class="h-[2px] w-16 bg-gradient-to-r from-primaryHover to-accentText mx-auto mt-5 rounded-full"></div>
    </div>

    <!-- Card -->
    <div class="bg-white/90 backdrop-blur rounded-3xl shadow-[0_24px_60px_-30px_rgba(160,122,82,0.25)] border border-accentMuted p-8 sm:p-10">

      <!-- Alert -->
      <div
        #alert
        *ngIf="showAlert"
        class="rounded-2xl p-3 text-center text-sm mb-5 transition-all"
        [ngClass]="{
          'bg-red-50 text-red-600 border border-red-100': isError,
          'bg-green-50 text-green-700 border border-green-100': !isError
        }">
        {{ alertMessage }}
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-[11px] uppercase tracking-[0.18em] text-inkSoft mb-2">
            Email
          </label>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="tu@correo.com"
            class="w-full px-4 py-3 rounded-2xl bg-pageBg/50 text-ink border border-accentMuted
                   placeholder:text-inkSoft/50
                   focus:outline-none focus:ring-2 focus:ring-accentText/30 focus:border-accentText
                   transition-all duration-200" />

          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
               class="text-red-500 text-xs mt-1.5 ml-1">
            <span *ngIf="loginForm.get('email')?.errors?.['required']">El email es obligatorio</span>
            <span *ngIf="loginForm.get('email')?.errors?.['email']">El formato del email no es válido</span>
          </div>
        </div>

        <!-- Password -->
        <div>
          <div class="flex items-baseline justify-between mb-2">
            <label class="block text-[11px] uppercase tracking-[0.18em] text-inkSoft">
              Contraseña
            </label>
            <a class="text-xs text-accentText hover:underline cursor-pointer"
               (click)="onForgotPassword()">
              ¿Olvidaste tu contraseña?
            </a>
          </div>
          <input
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••••"
            class="w-full px-4 py-3 rounded-2xl bg-pageBg/50 text-ink border border-accentMuted
                   placeholder:text-inkSoft/50
                   focus:outline-none focus:ring-2 focus:ring-accentText/30 focus:border-accentText
                   transition-all duration-200" />

          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
               class="text-red-500 text-xs mt-1.5 ml-1">
            <span *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es obligatoria</span>
          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          [disabled]="loginForm.invalid"
          class="w-full mt-2 py-3.5 rounded-full font-medium text-white bg-accentText
                 hover:opacity-90 active:scale-[0.99] disabled:opacity-50 disabled:cursor-not-allowed
                 transition-all duration-200 shadow-[0_8px_24px_-8px_rgba(160,122,82,0.5)]">
          Iniciar sesión
        </button>
      </form>

      <!-- Separador -->
      <div class="my-7 flex items-center gap-4">
        <div class="flex-1 h-px bg-accentMuted"></div>
        <span class="text-[10px] uppercase tracking-[0.22em] text-inkSoft">o</span>
        <div class="flex-1 h-px bg-accentMuted"></div>
      </div>

      <!-- Registro -->
      <p class="text-sm text-inkSoft text-center">
        ¿Aún no tienes cuenta?
        <a routerLink="/register"
           class="text-accentText hover:underline font-medium ml-1 transition">
          Crear cuenta
        </a>
      </p>
    </div>

    <!-- Footer del taller -->
    <p class="text-center text-[11px] uppercase tracking-[0.22em] text-inkSoft mt-8">
      3dlapiz · Atelier de figuras
    </p>
  </div>
</div>
