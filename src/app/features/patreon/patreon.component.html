<section class="bg-neutral-900 text-white py-16 px-6">
  <h2 class="text-3xl font-bold text-center mb-12">
    Elige tu suscripción
  </h2>

  <div class="grid gap-8 md:grid-cols-3 max-w-6xl mx-auto">
    <div
      *ngFor="let plan of plans"
      class="rounded-2xl border border-neutral-700 bg-neutral-800 p-6 flex flex-col"
      [class.ring-2]="plan.highlight"
      [class.ring-green-400]="plan.highlight"
    >
      <div *ngIf="plan.recommended"
           class="text-xs font-semibold text-center mb-3 text-green-400">
        RECOMENDADO POR EL CREADOR
      </div>

      <h3 class="text-xl font-bold mb-2">{{ plan.name }}</h3>
      <p class="text-2xl font-extrabold mb-6">{{ plan.price }}</p>

      <a
        [href]="patreonUrl"
        target="_blank"
        rel="noopener"
        class="mb-6 text-center rounded-xl bg-green-300 text-black font-semibold py-3 hover:bg-green-400 transition"
      >
        Súmate
      </a>

      <ul class="space-y-2 text-sm text-neutral-300">
        <li *ngFor="let item of plan.description">
          • {{ item }}
        </li>
      </ul>
    </div>
  </div>

  <div class="text-center mt-12">
    <a
      [href]="patreonUrl"
      target="_blank"
      class="text-green-400 hover:underline font-semibold"
    >
      Ver Patreon →
    </a>
  </div>
</section>
