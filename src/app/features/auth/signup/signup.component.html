<div
  class="min-h-screen flex items-center justify-center bg-primaryBg"
  style="
    background-image: url('https://cdnjs.cloudflare.com/ajax/libs/svg-backgrounds/1.0.0/hearts.svg');
    background-size: 200px;
  "
>
  <div
    class="bg-primaryWithBg p-8 rounded-3xl shadow-xl w-full max-w-md border border-primaryBg"
  >
    <!-- Header -->
    <div class="text-center mb-6">
      <h2
        class="text-3xl font-bold text-primaryText flex items-center justify-center"
      >
        <span class="mr-2">💖</span> Sign Up <span class="ml-2">💖</span>
      </h2>
      <p class="text-secundaryText mt-2">¡Únete a nuestra comunidad!</p>
    </div>

    <!-- Alert -->
    <div
      #alert
      class="alert rounded-2xl p-3 text-center"
      [class.show]="showAlert"
      [class.error]="isError"
      [ngClass]="{
        'bg-red-100 text-red-500 border border-red-200': isError,
        'bg-green-100 text-green-500 border border-green-200': !isError
      }"
    >
      {{ alertMessage }}
    </div>

    <!-- Form -->
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="space-y-4">

      <!-- Names -->
      <div class="grid grid-cols-2 gap-4">

        <!-- First Name -->
        <div>
          <label class="block text-sm font-medium text-primaryText">
            First Name
          </label>

          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-secundaryText"
            >
              👑
            </span>

            <input
              type="text"
              formControlName="first_name"
              class="mt-1 pl-10 p-3 w-full rounded-2xl bg-primaryBg/30 text-gray-700 border border-primaryBg focus:ring-2 focus:ring-primaryHover focus:border-primaryHover transition-all duration-200"
              required
            />
          </div>
        </div>

        <!-- Last Name -->
        <div>
          <label class="block text-sm font-medium text-primaryText">
            Last Name
          </label>

          <div class="relative">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3 text-secundaryText"
            >
              ✨
            </span>

            <input
              type="text"
              formControlName="last_name"
              class="mt-1 pl-10 p-3 w-full rounded-2xl bg-primaryBg/30 text-gray-700 border border-primaryBg focus:ring-2 focus:ring-primaryHover focus:border-primaryHover transition-all duration-200"
              required
            />
          </div>
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-primaryText">
          Email
        </label>

        <div class="relative">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3 text-secundaryText"
          >
            💌
          </span>

          <input
            type="email"
            formControlName="email"
            class="mt-1 pl-10 p-3 w-full rounded-2xl bg-primaryBg/30 text-gray-700 border border-primaryBg focus:ring-2 focus:ring-primaryHover focus:border-primaryHover transition-all duration-200"
            required
          />
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-primaryText">
          Password
        </label>

        <div class="relative">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3 text-secundaryText"
          >
            🔐
          </span>

          <input
            type="password"
            formControlName="password"
            class="mt-1 pl-10 p-3 w-full rounded-2xl bg-primaryBg/30 text-gray-700 border border-primaryBg focus:ring-2 focus:ring-primaryHover focus:border-primaryHover transition-all duration-200"
            required
          />
        </div>

        <!-- Password Strength -->
        <div
          [class]="
            'password-strength mt-2 p-2 rounded-full text-center text-sm font-medium ' +
            passwordStrength
          "
          [ngClass]="{
            'bg-red-100 text-red-500 border border-red-200':
              passwordStrength === 'weak',
            'bg-yellow-100 text-yellow-600 border border-yellow-200':
              passwordStrength === 'medium',
            'bg-green-100 text-green-500 border border-green-200':
              passwordStrength === 'strong'
          }"
        >
          {{ passwordStrength | titlecase }} password
          <span *ngIf="passwordStrength === 'weak'">😿</span>
          <span *ngIf="passwordStrength === 'medium'">😺</span>
          <span *ngIf="passwordStrength === 'strong'">😻</span>
        </div>
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="bg-primaryText text-white py-3 px-4 rounded-full font-bold hover:bg-primaryHover transition w-full shadow-md flex items-center justify-center mt-4"
      >
        <span class="mr-2">🌸</span> Create Account
        <span class="ml-2">🌸</span>
      </button>
    </form>

    <!-- Login Link -->
    <p class="mt-6 text-sm text-secundaryText text-center">
      Already have an account?
      <a
        routerLink="/login"
        class="text-primaryText hover:text-primaryHover font-medium ml-1 transition"
      >
        Login
      </a>
    </p>
  </div>
</div>
