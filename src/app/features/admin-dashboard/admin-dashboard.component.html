<div class="min-h-screen bg-primaryBg p-6">

  <!-- Title -->
  <div class="text-center mb-10">
    <h1 class="text-3xl font-bold text-primaryText">
      Admin Panel ⚙️
    </h1>

    <p class="text-secundaryText mt-2">
      Manage your store content
    </p>
  </div>

  <!-- Cards Container -->
  <div class="max-w-6xl mx-auto grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div
      *ngFor="let card of cards"
      [routerLink]="card.route"
      class="admin-card"
    >
      <div class="text-4xl mb-3">{{ card.icon }}</div>
      <h2>{{ card.title }}</h2>
      <p>{{ card.description }}</p>
    </div>
  </div>
</div>
