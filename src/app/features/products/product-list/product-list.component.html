<div class="min-h-screen bg-pageBg relative overflow-hidden py-6 sm:py-10">
  <!-- Patrón de puntos sutil de fondo -->
  <div
    class="absolute inset-0 opacity-30 pointer-events-none"
    style="
      background-image: radial-gradient(
        circle at 1px 1px,
        #cba57f33 1px,
        transparent 0
      );
      background-size: 32px 32px;
    "
  ></div>

  <div class="relative max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-8">
    <!-- Logo central -->
    <div class="text-center mb-6 sm:mb-12">
      <img
        src="/images/logo.png"
        alt="3DLapiz"
        class="mx-auto h-32 sm:h-40 md:h-48 w-auto"
      />
      <!-- Línea decorativa -->
      <div
        class="h-1 w-20 sm:w-24 bg-gradient-to-r from-primaryHover to-primaryText mx-auto mt-3 sm:mt-4 rounded-full"
      ></div>
      <!-- Descripción -->
      <p
        class="secundaryText mt-2 sm:mt-4 text-sm sm:text-base max-w-xl mx-auto px-4"
      >
        Descubre nuestras adorables figuras 3D hechas con amor para ti
      </p>
    </div>

    <!-- Grid de productos -->
    <div
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-7 lg:gap-8 px-3 sm:px-0"
    >
      <app-product-card
        *ngFor="let product of products; let i = index"
        [product]="product"
        [style.animation]="'fadeUp .6s ' + i * 0.06 + 's both'"
      >
      </app-product-card>
    </div>

    <!-- Paginación -->
    <div class="mt-12 sm:mt-16 flex justify-center">
      <div class="flex items-center gap-2">
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full bg-white border border-accentMuted text-accentText hover:bg-accentSoft transition-colors duration-200"
        >
          ←
        </button>
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full bg-accentText text-white border border-accentText shadow-sm font-medium"
        >
          1
        </button>
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full bg-white border border-accentMuted text-inkSoft hover:bg-accentSoft hover:text-accentText transition-colors duration-200 font-medium"
        >
          2
        </button>
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full bg-white border border-accentMuted text-accentText hover:bg-accentSoft transition-colors duration-200"
        >
          →
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  @media (max-width: 640px) {
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  }
</style>
