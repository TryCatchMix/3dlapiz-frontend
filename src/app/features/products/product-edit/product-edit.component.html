<div class="min-h-screen bg-secondaryBg py-6 sm:py-10">

  <!-- Formulario de edición -->
  <div class="edit-container max-w-xl mx-auto mb-10" *ngIf="selectedProduct; else productListTpl">
    <h1 class="text-2xl font-bold mb-4">Edit Product: {{ selectedProduct.name }}</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group mb-4">
        <label>Name</label>
        <input type="text" formControlName="name" class="w-full p-2 border rounded" />
      </div>

      <div class="form-group mb-4">
        <label>Description</label>
        <textarea rows="4" formControlName="description" class="w-full p-2 border rounded"></textarea>
      </div>

      <div class="form-group mb-4">
        <label>Price (€)</label>
        <input type="number" step="0.01" formControlName="price" class="w-full p-2 border rounded" />
      </div>

      <div class="form-group mb-4">
        <label>Stock</label>
        <input type="number" formControlName="stock" class="w-full p-2 border rounded" />
      </div>

      <div class="flex justify-end space-x-2">
        <button type="button" class="px-4 py-2 border rounded" (click)="cancelEdit()">Cancel</button>
        <button type="submit" [disabled]="saving || form.invalid" class="px-4 py-2 bg-primaryText text-primaryWithBg rounded">
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </form>
  </div>

  <!-- Lista de productos -->
  <ng-template #productListTpl>
    <div class="max-w-7xl mx-auto px-3 sm:px-4">
      <div class="text-center mb-6">
        <h1 class="text-2xl sm:text-3xl font-bold text-primaryText">Nuestros Productos</h1>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        <div *ngFor="let product of products" class="cursor-pointer border p-4 rounded hover:shadow-md transition" (click)="selectProduct(product)">
          <h2 class="font-bold text-lg">{{ product.name }}</h2>
          <p class="text-sm mt-1">{{ product.description }}</p>
          <p class="text-sm mt-2 font-semibold">Price: €{{ product.price }}</p>
          <p class="text-sm">Stock: {{ product.stock }}</p>
        </div>
      </div>
    </div>
  </ng-template>
</div>
