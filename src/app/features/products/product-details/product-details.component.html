<div class="flex justify-center items-center min-h-screen bg-gray-100 p-4">
  <div class="w-full max-w-7xl h-[85vh] p-8 bg-white rounded-3xl shadow-2xl overflow-auto">
    <div *ngIf="product" class="grid grid-cols-1 md:grid-cols-2 gap-10 h-full">
      <!-- IMÁGENES -->
      <div class="flex flex-col justify-start h-full">
        <div
          class="relative w-full h-80 md:h-[500px] overflow-hidden rounded-2xl shadow-lg mb-6 cursor-pointer"
          (click)="openLightbox(currentImageIndex)"
        >
          <img
            [src]="'http://localhost:8000/' + product.images[currentImageIndex].image_url"
            [alt]="product.name"
            class="w-full h-full object-cover rounded-2xl transition-transform duration-500 hover:scale-105"
          />

          <!-- Botón anterior -->
          <button
            (click)="prevImage(); $event.stopPropagation()"
            class="absolute top-1/2 left-4 transform -translate-y-1/2 px-4 py-2 bg-black bg-opacity-40 text-white rounded-full hover:bg-opacity-60 focus:outline-none shadow-md"
          >
            <span class="text-2xl">&lt;</span>
          </button>

          <!-- Botón siguiente -->
          <button
            (click)="nextImage(); $event.stopPropagation()"
            class="absolute top-1/2 right-4 transform -translate-y-1/2 px-4 py-2 bg-black bg-opacity-40 text-white rounded-full hover:bg-opacity-60 focus:outline-none shadow-md"
          >
            <span class="text-2xl">&gt;</span>
          </button>

          <!-- Indicadores -->
          <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex space-x-2">
            <div
              *ngFor="let image of product.images; let i = index"
              (click)="setImageIndex(i); $event.stopPropagation()"
              class="w-3 h-3 rounded-full cursor-pointer transition-all duration-200"
              [ngClass]="{
                'bg-primaryText scale-125': currentImageIndex === i,
                'bg-black/30': currentImageIndex !== i
              }"
            ></div>
          </div>
        </div>

        <!-- Thumbnails -->
        <div class="grid grid-cols-4 gap-3">
          <div
            *ngFor="let image of product.images; let i = index"
            (click)="setImageIndex(i)"
            class="overflow-hidden rounded-xl cursor-pointer transition-transform duration-300 hover:scale-105"
            [ngClass]="{
              'ring-2 ring-primaryHover': currentImageIndex === i
            }"
          >
            <img
              [src]="'http://localhost:8000/' + image.image_url"
              [alt]="product.name"
              class="w-full h-20 object-cover rounded-xl"
            />
          </div>
        </div>
      </div>

      <!-- INFO PRODUCTO -->
      <div class="flex flex-col justify-start h-full overflow-y-auto">
        <h1 class="font-bold text-3xl mb-6 text-primaryText">{{ product.name }}</h1>

        <div class="flex items-center mb-6">
  <span class="text-3xl font-bold text-primaryText">${{ currentPrice | number:'1.2-2' }}</span>
  <span
    *ngIf="selectedVariant === 'unpainted' && product.price"
    class="ml-4 text-xl line-through text-black/40"
  >
    ${{ product.price | number:'1.2-2' }}
  </span>
</div>

        <p class="mb-6 text-black leading-relaxed">{{ product.description }}</p>
<div *ngIf="hasUnpaintedOption" class="mb-6">
  <label class="block text-sm font-medium text-primaryText mb-2">Acabado</label>
  <div class="inline-flex rounded-full border border-gray-300 overflow-hidden">
    <button
      type="button"
      (click)="setVariant('painted')"
      [ngClass]="selectedVariant === 'painted' ? 'bg-primaryText text-primaryWithBg' : 'bg-white text-primaryText'"
      class="px-4 py-2 text-sm font-medium"
    >
      Pintada
    </button>
    <button
      type="button"
      (click)="setVariant('unpainted')"
      [ngClass]="selectedVariant === 'unpainted' ? 'bg-primaryText text-primaryWithBg' : 'bg-white text-primaryText'"
      class="px-4 py-2 text-sm font-medium border-l border-gray-300"
    >
      Sin pintar
    </button>
  </div>
</div>
        <!-- Stock -->
        <div class="mb-6">
          <p class="text-sm flex items-center">
            <span
              *ngIf="product.stock > 0"
              class="bg-green-100 text-green-800 text-xs font-semibold px-3 py-1 rounded-full border border-green-300"
            >
              En stock: {{ product.stock }} unidades
            </span>

            <span
              *ngIf="product.stock <= 0"
              class="bg-red-100 text-red-800 text-xs font-semibold px-3 py-1 rounded-full"
            >
              Agotado
            </span>
          </p>
        </div>

        <!-- Cantidad -->
        <div class="mb-6">
          <label for="quantity" class="block text-sm font-medium text-primaryText mb-2">
            Cantidad
          </label>
          <div class="flex items-center">
            <button
              (click)="decreaseQuantity()"
              [disabled]="quantity <= 1"
              class="px-5 py-2 bg-gray-200 text-primaryText rounded-l-full hover:bg-gray-300 disabled:opacity-50"
            >
              -
            </button>
            <span class="px-8 py-2 bg-white text-center w-20">{{ quantity }}</span>
            <button
              (click)="increaseQuantity()"
              [disabled]="quantity >= product.stock"
              class="px-5 py-2 bg-gray-200 text-primaryText rounded-r-full hover:bg-gray-300 disabled:opacity-50"
            >
              +
            </button>
          </div>
        </div>

        <!-- Botón carrito -->
        <div class="flex space-x-4 mb-6">
          <button
            (click)="addToCart()"
            [disabled]="product.stock <= 0"
            class="w-full bg-primaryBg text-black font-medium py-4 px-6 rounded-2xl hover:bg-primaryHover disabled:opacity-50 disabled:cursor-not-allowed"
          >
            <span *ngIf="product.stock > 0">Añadir al carrito</span>
            <span *ngIf="product.stock <= 0">Agotado</span>
          </button>
        </div>

        <!-- Detalles -->
        <div class="mt-8 border-t border-gray-200 pt-6">
          <h3 class="text-xl font-medium text-primaryText mb-4">Detalles del producto</h3>
          <dl class="grid grid-cols-1 gap-y-4">
            <div *ngIf="product.sku">
              <dt class="text-sm font-medium text-black/60">SKU</dt>
              <dd class="mt-1 text-sm text-black">{{ product.sku }}</dd>
            </div>
            <div *ngIf="product.brand">
              <dt class="text-sm font-medium text-black/60">Marca</dt>
              <dd class="mt-1 text-sm text-black">{{ product.brand }}</dd>
            </div>
          </dl>
          <div *ngIf="safeVideoUrl" class="mt-4">
  <dt class="text-sm font-medium text-black/60 mb-2">Vídeo</dt>
  <dd>
    <div class="relative w-full" style="padding-bottom: 56.25%;">
      <iframe
        [src]="safeVideoUrl"
        class="absolute inset-0 w-full h-full rounded-xl"
        frameborder="0"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
        allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>
  </dd>
</div>
        </div>
      </div>
    </div>

    <!-- Loader -->
    <div *ngIf="!product" class="flex justify-center items-center h-full">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-primaryHover"></div>
    </div>

<div
  *ngIf="lightboxOpen"
  class="fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-50"
>
  <div class="relative max-w-[70vw] max-h-[70vh] flex justify-center items-center">
    <!-- Imagen -->
    <img
      [src]="'http://localhost:8000/' + product.images[lightboxIndex].image_url"
      [alt]="product.name"
      class="max-w-full max-h-full object-contain rounded-xl"
    />

    <!-- Botón cerrar -->
    <button
      (click)="closeLightbox()"
      class="absolute top-[-10px] right-[-10px] bg-white text-black w-10 h-10 flex justify-center items-center rounded-full shadow-lg hover:bg-gray-200 focus:outline-none"
    >
      &times;
    </button>
  </div>
</div>
  </div>
</div>
