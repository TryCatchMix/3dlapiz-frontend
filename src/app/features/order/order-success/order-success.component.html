<div class="min-h-[60vh] flex items-center justify-center p-6">
  <div class="max-w-lg w-full bg-white rounded-2xl shadow-lg p-8 text-center">

    <!-- Loading -->
    <ng-container *ngIf="loading()">
      <div class="text-5xl mb-4">⏳</div>
      <h1 class="text-2xl font-bold mb-2">Confirmando tu pago…</h1>
      <p class="text-gray-600">Un momento, estamos verificando la transacción.</p>
    </ng-container>

    <!-- Éxito -->
    <ng-container *ngIf="!loading() && success() && order() as o">
      <div class="text-6xl mb-4">✅</div>
      <h1 class="text-2xl font-bold mb-2">¡Pago completado!</h1>
      <p class="text-gray-600 mb-6">
        Hemos recibido tu pedido <strong>#{{ o.order_number }}</strong>.
        Te enviaremos un email cuando esté listo para enviar.
      </p>

      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button (click)="goToOrders()" class="px-5 py-2.5 rounded-lg bg-primaryText text-primaryWithBg font-medium">
          Ver mis pedidos
        </button>
        <button (click)="goToHome()" class="px-5 py-2.5 rounded-lg border border-gray-300">
          Volver al inicio
        </button>
      </div>
    </ng-container>

    <!-- Error -->
    <ng-container *ngIf="!loading() && !success()">
      <div class="text-5xl mb-4">⚠️</div>
      <h1 class="text-2xl font-bold mb-2">Algo ha ido mal</h1>
      <p class="text-gray-600 mb-6">{{ errorMessage() }}</p>
      <div class="flex gap-3 justify-center">
        <button (click)="goToHome()" class="px-5 py-2.5 rounded-lg bg-primaryText text-primaryWithBg font-medium">
          Volver al inicio
        </button>
      </div>
    </ng-container>

  </div>
</div>
