<div class="max-w-5xl mx-auto p-4 md:p-6">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold">Códigos de descuento</h1>
    <button
      (click)="showForm.set(!showForm())"
      class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
      {{ showForm() ? 'Cancelar' : '+ Nuevo código' }}
    </button>
  </div>

  <!-- Formulario nuevo código -->
  <form
    *ngIf="showForm()"
    [formGroup]="form"
    (ngSubmit)="create()"
    class="bg-white rounded-xl shadow p-6 mb-6 grid grid-cols-1 md:grid-cols-2 gap-4"
  >
    <div>
      <label class="block text-sm font-medium mb-1">Código *</label>
      <input formControlName="code" placeholder="VERANO2026" class="w-full border rounded p-2 uppercase" />
      <p class="text-xs text-gray-500 mt-1">3-20 caracteres. Letras, números y guiones.</p>
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Porcentaje (%) *</label>
      <input type="number" formControlName="percentage" min="1" max="99" class="w-full border rounded p-2" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Caduca el (opcional)</label>
      <input type="datetime-local" formControlName="expires_at" class="w-full border rounded p-2" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Pedido mínimo (€) (opcional)</label>
      <input type="number" formControlName="min_order_amount" step="0.01" min="0" class="w-full border rounded p-2" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Máximo usos totales (opcional)</label>
      <input type="number" formControlName="max_uses" min="1" class="w-full border rounded p-2" />
    </div>

    <div>
      <label class="block text-sm font-medium mb-1">Máximo usos por usuario (opcional)</label>
      <input type="number" formControlName="max_uses_per_user" min="1" class="w-full border rounded p-2" />
    </div>

    <div class="md:col-span-2 flex justify-end">
      <button type="submit"
              [disabled]="form.invalid"
              class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 disabled:opacity-50">
        Crear código
      </button>
    </div>
  </form>

  <!-- Lista -->
  <div *ngIf="loading()" class="text-center py-8 text-gray-500">Cargando…</div>

  <div *ngIf="!loading() && discounts().length === 0" class="text-center py-8 text-gray-500 bg-white rounded-xl">
    No hay códigos de descuento creados todavía.
  </div>

  <div *ngIf="!loading() && discounts().length > 0" class="bg-white rounded-xl shadow overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-gray-50">
        <tr class="text-left">
          <th class="p-3">Código</th>
          <th class="p-3">%</th>
          <th class="p-3">Caduca</th>
          <th class="p-3">Usos</th>
          <th class="p-3">Estado</th>
          <th class="p-3"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let d of discounts()" class="border-t">
          <td class="p-3 font-mono font-bold">{{ d.code }}</td>
          <td class="p-3">{{ d.percentage }}%</td>
          <td class="p-3">{{ d.expires_at ? (d.expires_at | date:'short') : '—' }}</td>
          <td class="p-3">
            {{ d.used_count }}
            <span *ngIf="d.max_uses">/ {{ d.max_uses }}</span>
          </td>
          <td class="p-3">
            <button
              (click)="toggleActive(d)"
              class="px-2 py-1 rounded text-xs"
              [class.bg-green-100]="d.active"
              [class.text-green-700]="d.active"
              [class.bg-gray-200]="!d.active"
              [class.text-gray-600]="!d.active">
              {{ d.active ? 'Activo' : 'Desactivado' }}
            </button>
          </td>
          <td class="p-3 text-right">
            <button (click)="remove(d)" class="text-red-600 hover:underline text-xs">Eliminar</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
