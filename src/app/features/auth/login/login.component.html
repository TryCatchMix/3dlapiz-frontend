<div
  class="min-h-screen flex items-center justify-center bg-primaryBg"
  style="
    background-image: url('https://cdnjs.cloudflare.com/ajax/libs/svg-backgrounds/1.0.0/sparkles.svg');
    background-size: 300px;
  "
>
  <div
    class="bg-primaryWithBg p-8 rounded-3xl shadow-xl w-full max-w-md border border-primaryBg"
  >
    <!-- Header -->
    <div class="text-center mb-6">
      <h2
        class="text-3xl font-bold text-primaryText flex items-center justify-center"
      >
        <span class="mr-2">✨</span> Login <span class="ml-2">✨</span>
      </h2>
      <p class="text-secundaryText mt-2">Bienvenido de vuelta!</p>
    </div>

    <!-- Alert -->
    <div
      #alert
      class="alert rounded-2xl p-3 text-center"
      [class.show]="showAlert"
      [class.error]="isError"
      [ngClass]="{
        'bg-red-100 text-red-500 border border-red-200': isError,
        'bg-green-100 text-green-500 border border-green-200': !isError
      }"
    >
      {{ alertMessage }}
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-primaryText">
          Email
        </label>

        <div class="relative">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3 text-secundaryText"
          >
            💌
          </span>

          <input
            type="email"
            formControlName="email"
            class="mt-1 pl-10 p-3 w-full rounded-2xl bg-primaryBg/30 text-gray-700 border border-primaryBg focus:ring-2 focus:ring-primaryHover focus:border-primaryHover transition-all duration-200"
            required
          />
        </div>

        <div
          *ngIf="
            loginForm.get('email')?.invalid &&
            loginForm.get('email')?.touched
          "
          class="text-red-400 text-sm mt-1"
        >
          <div *ngIf="loginForm.get('email')?.errors?.['required']">
            Email is required
          </div>
          <div *ngIf="loginForm.get('email')?.errors?.['email']">
            Email format is invalid
          </div>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-primaryText">
          Password
        </label>

        <div class="relative">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3 text-secundaryText"
          >
            🔐
          </span>

          <input
            type="password"
            formControlName="password"
            class="mt-1 pl-10 p-3 w-full rounded-2xl bg-primaryBg/30 text-gray-700 border border-primaryBg focus:ring-2 focus:ring-primaryHover focus:border-primaryHover transition-all duration-200"
            required
          />
        </div>

        <div
          *ngIf="
            loginForm.get('password')?.invalid &&
            loginForm.get('password')?.touched
          "
          class="text-red-400 text-sm mt-1"
        >
          <div *ngIf="loginForm.get('password')?.errors?.['required']">
            Password is required
          </div>
        </div>

        <div class="mt-2 text-right">
          <a
            class="text-sm text-primaryText hover:text-primaryHover cursor-pointer transition"
            (click)="onForgotPassword()"
          >
            Forgot password?
          </a>
        </div>
      </div>

      <!-- Button -->
      <button
        type="submit"
        class="bg-primaryText text-white py-3 px-4 rounded-full font-bold hover:bg-primaryHover transition w-full shadow-md flex items-center justify-center"
      >
        <span class="mr-2">✨</span> Login <span class="ml-2">✨</span>
      </button>
    </form>

    <!-- Register -->
    <p class="mt-6 text-sm text-secundaryText text-center">
      Don't have an account?
      <a
        routerLink="/register"
        class="text-primaryText hover:text-primaryHover font-medium ml-1 transition"
      >
        Sign up
      </a>
    </p>
  </div>
</div>
