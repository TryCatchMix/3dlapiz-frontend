<div class="min-h-screen bg-pageBg relative overflow-hidden py-6 sm:py-10">

  <!-- Patrón de puntos sutil de fondo -->
  <div class="absolute inset-0 opacity-30 pointer-events-none"
       style="background-image: radial-gradient(circle at 1px 1px, #cba57f33 1px, transparent 0);
              background-size: 32px 32px;"></div>

  <div class="relative max-w-7xl mx-auto px-3 sm:px-4 py-4 sm:py-8">

    <!-- Título -->
    <div class="text-center mb-8 sm:mb-14">
      <div class="text-[10px] sm:text-xs uppercase tracking-[0.3em] text-accentText mb-3">
        Catálogo · 2026
      </div>

      <h1 class="font-serif text-4xl sm:text-6xl font-medium leading-[0.98] -tracking-[0.025em] text-ink inline-block">
        Nuestras <span class="italic text-accentText">figuras</span>
      </h1>

      <!-- Línea decorativa -->
      <div class="h-[2px] w-20 sm:w-24 bg-gradient-to-r from-primaryHover to-accentText mx-auto mt-4 sm:mt-5 rounded-full"></div>

      <!-- Descripción -->
      <p class="text-inkSoft mt-3 sm:mt-5 text-sm sm:text-[15px] max-w-lg mx-auto px-4">
        Descubre nuestras adorables figuras 3D hechas con amor para ti
      </p>
    </div>

    <!-- Grid de productos -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-7 lg:gap-8 px-3 sm:px-0">
      <app-product-card *ngFor="let product of products; let i = index"
                        [product]="product"
                        [style.animation]="'fadeUp .6s ' + (i * 0.06) + 's both'">
      </app-product-card>
    </div>

    <!-- Paginación -->
    <div class="mt-12 sm:mt-16 flex justify-center">
      <div class="flex items-center gap-2">
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full
                 bg-white border border-accentMuted text-accentText
                 hover:bg-accentSoft transition-colors duration-200">
          ←
        </button>
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full
                 bg-accentText text-white border border-accentText shadow-sm font-medium">
          1
        </button>
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full
                 bg-white border border-accentMuted text-inkSoft
                 hover:bg-accentSoft hover:text-accentText transition-colors duration-200 font-medium">
          2
        </button>
        <button
          class="w-10 h-10 sm:w-11 sm:h-11 flex items-center justify-center rounded-full
                 bg-white border border-accentMuted text-accentText
                 hover:bg-accentSoft transition-colors duration-200">
          →
        </button>
      </div>
    </div>
  </div>
</div>

<style>
  @media (max-width: 640px) {
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
  }
</style>
