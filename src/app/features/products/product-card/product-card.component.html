<div
  (click)="goToProductDetails()"
  class="
    rounded-xl sm:rounded-2xl overflow-hidden
    shadow-md sm:shadow-lg
    border-2 border-primaryBg     <!-- COLOR BORDE -->
    bg-primaryWithBg                  <!-- COLOR FONDO TARJETA -->
    transition-all hover:scale-105 hover:shadow-xl
    cursor-pointer h-full flex flex-col
  "
>
  <div class="relative">
    <div
      class="
        absolute top-2 left-2
        bg-primaryWithBg               <!-- FONDO BADGE -->
        text-primaryText           <!-- TEXTO BADGE -->
        text-xs px-2 sm:px-3 py-0.5 sm:py-1
        rounded-full shadow-sm z-10
      "
    >
      <span>✨ Cute ✨</span>
    </div>

    <div
      class="
        flex space-x-2 overflow-x-auto
        p-2 sm:p-4
        bg-primaryWithBg              <!-- FONDO IMÁGENES -->
      "
    >
      <img
        *ngIf="product.images && product.images.length > 0; else noImage"
        [src]="'http://localhost:8000/' + product.images[0].image_url"
        [alt]="product.name"
        class="
          h-40 sm:h-64 md:h-72 w-full
          object-contain object-center
          transition-transform hover:scale-105
          rounded-lg sm:rounded-xl
        "
      />

      <ng-template #noImage>
        <img
          src="http://localhost:8000/images/default-placeholder.jpg"
          alt="Imagen no disponible"
          class="
            h-40 sm:h-64 md:h-72 w-full
            object-contain object-center
            rounded-lg sm:rounded-xl
          "
        />
      </ng-template>
    </div>
  </div>

  <div class="px-3 sm:px-6 py-3 sm:py-4 flex-grow">
    <div
      class="
        font-bold text-lg sm:text-xl
        mb-1 sm:mb-2
        text-primaryText            <!-- TEXTO NOMBRE -->
        flex items-center
      "
    >
      <span class="mr-1 sm:mr-2 text-sm sm:text-base">🎁</span>
      <span class="truncate">{{ product.name }}</span>
    </div>

    <p
      class="
        text-primaryText            <!-- TEXTO DESCRIPCIÓN -->
        text-sm sm:text-base
        mb-1 sm:mb-2
        line-clamp-2
      "
    >
      {{ product.description }}
    </p>

    <p
      class="
        text-lg sm:text-xl font-bold
        text-primaryText            <!-- TEXTO PRECIO -->
        flex items-center
      "
    >
      <span class="mr-1 sm:mr-2 text-sm sm:text-base">💖</span>
      ${{ product.price }}
    </p>

    <div
      class="
        mt-1 sm:mt-2
        bg-primaryWithBg              <!-- FONDO STOCK -->
        px-2 sm:px-3 py-0.5 sm:py-1
        rounded-full inline-block
      "
    >
      <p
        class="
          text-xs sm:text-sm
          text-primaryText          <!-- TEXTO STOCK -->
          flex items-center
        "
      >
        <span class="mr-1">📦</span> Stock: {{ product.stock }}
      </p>
    </div>

    <button
      (click)="addToCart(product); $event.stopPropagation()"
      class="
        mt-3 sm:mt-4 w-full
        bg-primaryBg               <!-- FONDO BOTÓN -->
        hover:bg-primaryHover      <!-- HOVER BOTÓN -->
        text-black                 <!-- TEXTO BOTÓN -->
        font-bold
        py-2 sm:py-3 px-4 sm:px-6
        rounded-full shadow-md
        transition-all duration-200
        flex items-center justify-center
        text-sm sm:text-base
      "
    >
      <span class="mr-1 sm:mr-2">🛍️</span> Añadir al carrito
    </button>
  </div>

  <div
    class="
      h-1 sm:h-2
      bg-primaryBg                <!-- BARRA INFERIOR -->
      rounded-b-xl sm:rounded-b-2xl
    "
  ></div>
</div>
